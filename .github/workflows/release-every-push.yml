name: Build and release every push

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

# The workflow creates a tag and full (non-prerelease) release for the commit
# that triggered it. Branch-only filtering above excludes tag pushes, and
# GITHUB_TOKEN-generated events do not recursively start another ordinary
# push workflow.
permissions:
  actions: write
  contents: write

jobs:
  windows-installer:
    name: Windows installer
    runs-on: windows-2022
    timeout-minutes: 180
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows-static-md
      VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static-md

    steps:
      - name: Check out the pushed commit
        uses: actions/checkout@v4

      - name: Activate the MSVC 2022 toolchain
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: "qt5compat qtimageformats qtshadertools"
          cache: true

      - name: Set up vcpkg and binary caching
        uses: lukka/run-vcpkg@v11.6
        with:
          vcpkgJsonGlob: "**/vcpkg.json"
          runVcpkgInstall: false

      - name: Configure the release build
        shell: pwsh
        run: |
          $shortSha = $env:GITHUB_SHA.Substring(0, 8)
          $buildId = "build.$env:GITHUB_RUN_NUMBER.$shortSha"
          "QBT_BUILD_ID=$buildId" >> $env:GITHUB_ENV

          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static-md `
            "-DQBT_BUILD_ID=$buildId"

      - name: Build
        shell: pwsh
        run: cmake --build build --parallel

      - name: Build and verify the NSIS installer
        id: package
        shell: pwsh
        run: |
          cpack --config build/CPackConfig.cmake -G NSIS -C Release
          $cpackExitCode = $LASTEXITCODE

          $nsisLog = "build/packages/_CPack_Packages/win64/NSIS/NSISOutput.log"
          if (Test-Path -LiteralPath $nsisLog) {
            Write-Host "----- NSISOutput.log -----"
            Get-Content -LiteralPath $nsisLog
            Write-Host "----- end NSISOutput.log -----"
          }
          if ($cpackExitCode -ne 0) {
            throw "cpack exited with code $cpackExitCode."
          }

          $installers = @(
            Get-ChildItem -Path "build/packages" -File `
              -Filter "qBittorrent-Material-*-$env:QBT_BUILD_ID-windows-x64.exe"
          )
          if ($installers.Count -ne 1) {
            throw "Expected exactly one NSIS installer, found $($installers.Count)."
          }
          $installer = $installers[0]
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $installer.FullName).Hash.ToLowerInvariant()

          $smokeRoot = Join-Path $env:RUNNER_TEMP "qbt-material-smoke"
          if (Test-Path -LiteralPath $smokeRoot) {
            Remove-Item -Recurse -Force -LiteralPath $smokeRoot
          }
          $installProcess = Start-Process -FilePath $installer.FullName `
            -ArgumentList @("/S", "/D=$smokeRoot") `
            -PassThru -Wait
          if ($installProcess.ExitCode -ne 0) {
            throw "Silent installer returned exit code $($installProcess.ExitCode)."
          }

          $installedExe = Join-Path $smokeRoot "bin/qbittorrent.exe"
          # Qt's CMake deployment API keeps plugins at the install prefix,
          # beside bin/, rather than nesting them under the executable folder.
          $platformPlugin = Join-Path $smokeRoot "plugins/platforms/qwindows.dll"
          if (-not (Test-Path -LiteralPath $installedExe)) {
            throw "Installed executable is missing: $installedExe"
          }
          if (-not (Test-Path -LiteralPath $platformPlugin)) {
            throw "Qt platform plugin is missing: $platformPlugin"
          }

          $gitExecutable = (Get-Command git.exe -CommandType Application -ErrorAction Stop `
            | Select-Object -First 1).Source
          $originalPath = $env:PATH
          $env:PATH = (@($originalPath -split ";" | Where-Object {
            $segment = $_.Trim()
            if ([string]::IsNullOrWhiteSpace($segment)) { return $false }
            -not (Test-Path -LiteralPath (Join-Path $segment "git.exe")) `
              -and -not (Test-Path -LiteralPath (Join-Path $segment "git.cmd"))
          }) -join ";")
          $gitOnPath = @($env:PATH -split ";" | Where-Object {
            $segment = $_.Trim()
            $segment -and ((Test-Path -LiteralPath (Join-Path $segment "git.exe")) `
              -or (Test-Path -LiteralPath (Join-Path $segment "git.cmd")))
          })
          if ($gitOnPath.Count -ne 0) {
            throw "Git must be absent from PATH during the installed-app smoke test."
          }

          $workspaceRoot = Join-Path $env:RUNNER_TEMP "qbt-material-workspace-smoke"
          if (Test-Path -LiteralPath $workspaceRoot) {
            Remove-Item -Recurse -Force -LiteralPath $workspaceRoot
          }
          $env:QBT_WORKSPACE_ROOT = $workspaceRoot
          $env:QT_QPA_PLATFORM = "offscreen"
          $process = Start-Process -FilePath $installedExe -PassThru
          Start-Sleep -Seconds 10
          if ($process.HasExited) {
            throw "Installed application exited during smoke test with code $($process.ExitCode)."
          }
          Stop-Process -Id $process.Id -Force
          $process.WaitForExit()

          $workspaceJson = Join-Path $workspaceRoot "workspace.json"
          $workspaceGit = Join-Path $workspaceRoot ".git"
          $workspaceTabs = @(Get-ChildItem -LiteralPath (Join-Path $workspaceRoot "tabs") `
            -Filter "*.md" -File -ErrorAction SilentlyContinue)
          if (-not (Test-Path -LiteralPath $workspaceJson)) {
            throw "Installed application did not persist workspace.json."
          }
          if (-not (Test-Path -LiteralPath $workspaceGit)) {
            throw "Installed application did not initialize its embedded local Git repository."
          }
          if ($workspaceTabs.Count -ne 1) {
            throw "Expected one persisted welcome tab, found $($workspaceTabs.Count)."
          }

          $workspaceState = Get-Content -Raw -LiteralPath $workspaceJson | ConvertFrom-Json
          if ($workspaceState.type -ne "qbt-material-workspace" `
              -or $workspaceState.schemaVersion -ne 1 `
              -or @($workspaceState.tabs).Count -ne 1) {
            throw "Persisted workspace metadata failed schema validation."
          }

          # Simulate a crash after a new tab body was atomically written but
          # before workspace.json was replaced. The next launch must adopt the
          # orphan as a recovered tab instead of deleting the only copy.
          $orphanId = [guid]::NewGuid().ToString()
          $orphanContent = "Recovered after interrupted metadata save"
          $orphanPath = Join-Path $workspaceRoot "tabs/$orphanId.md"
          [IO.File]::WriteAllText($orphanPath, $orphanContent, [Text.UTF8Encoding]::new($false))

          $recoveryProcess = Start-Process -FilePath $installedExe -PassThru
          Start-Sleep -Seconds 10
          if ($recoveryProcess.HasExited) {
            throw "Installed application exited during crash-recovery smoke test with code $($recoveryProcess.ExitCode)."
          }
          Stop-Process -Id $recoveryProcess.Id -Force
          $recoveryProcess.WaitForExit()

          $recoveredState = Get-Content -Raw -LiteralPath $workspaceJson | ConvertFrom-Json
          $recoveredTabs = @($recoveredState.tabs)
          $recoveredRecord = @($recoveredTabs | Where-Object { $_.id -eq $orphanId })
          if ($recoveredTabs.Count -ne 2 -or $recoveredRecord.Count -ne 1 `
              -or $recoveredRecord[0].name -notlike "Recovered tab *" `
              -or (Get-Content -Raw -LiteralPath $orphanPath) -ne $orphanContent) {
            throw "Interrupted tab body was not recovered without data loss."
          }

          $recoveryHeadFiles = @(& $gitExecutable -C $workspaceRoot ls-tree -r --name-only HEAD)
          if ($recoveryHeadFiles -notcontains "tabs/$orphanId.md") {
            throw "Recovered tab was not committed by embedded libgit2."
          }

          # Simulate the opposite crash window: workspace.json recorded a close,
          # but the previously tracked body still exists. It must be cleaned up
          # without resurrecting the intentionally closed tab.
          $remainingTabs = @($recoveredTabs | Where-Object { $_.id -ne $orphanId })
          $recoveredState.tabs = $remainingTabs
          $recoveredState.activeTabId = $remainingTabs[0].id
          $closedMetadata = $recoveredState | ConvertTo-Json -Depth 20
          [IO.File]::WriteAllText($workspaceJson, $closedMetadata, [Text.UTF8Encoding]::new($false))

          $closeRecoveryProcess = Start-Process -FilePath $installedExe -PassThru
          Start-Sleep -Seconds 10
          if ($closeRecoveryProcess.HasExited) {
            throw "Installed application exited during interrupted-close smoke test with code $($closeRecoveryProcess.ExitCode)."
          }
          Stop-Process -Id $closeRecoveryProcess.Id -Force
          $closeRecoveryProcess.WaitForExit()

          $closedState = Get-Content -Raw -LiteralPath $workspaceJson | ConvertFrom-Json
          if (@($closedState.tabs).Count -ne 1 `
              -or @($closedState.tabs | Where-Object { $_.id -eq $orphanId }).Count -ne 0 `
              -or (Test-Path -LiteralPath $orphanPath)) {
            throw "Interrupted close was resurrected instead of completed."
          }

          $env:PATH = $originalPath
          & $gitExecutable -C $workspaceRoot rev-parse --verify HEAD | Out-Null
          if ($LASTEXITCODE -ne 0) {
            throw "Embedded libgit2 did not create the initial workspace commit."
          }
          & $gitExecutable -C $workspaceRoot fsck --strict
          if ($LASTEXITCODE -ne 0) {
            throw "Workspace repository failed git fsck."
          }
          $headFiles = @(& $gitExecutable -C $workspaceRoot ls-tree -r --name-only HEAD)
          if ($headFiles -contains "tabs/$orphanId.md") {
            throw "Closed tab remains in the final embedded Git commit."
          }
          $workspaceStatus = @(& $gitExecutable -C $workspaceRoot status --porcelain)
          if ($workspaceStatus.Count -ne 0) {
            throw "Recovered workspace repository is not clean."
          }

          $uninstaller = Join-Path $smokeRoot "Uninstall.exe"
          if (-not (Test-Path -LiteralPath $uninstaller)) {
            throw "NSIS uninstaller is missing: $uninstaller"
          }
          $uninstallProcess = Start-Process -FilePath $uninstaller -ArgumentList "/S" -PassThru -Wait
          if ($uninstallProcess.ExitCode -ne 0) {
            throw "Silent uninstaller returned exit code $($uninstallProcess.ExitCode)."
          }

          "installer=$($installer.FullName)" >> $env:GITHUB_OUTPUT
          "sha256=$hash" >> $env:GITHUB_OUTPUT
          "Installer: $($installer.Name)"
          "SHA256: $hash"

      - name: Create or update this push's release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          INSTALLER_PATH: ${{ steps.package.outputs.installer }}
          INSTALLER_SHA256: ${{ steps.package.outputs.sha256 }}
        run: |
          $shortSha = $env:GITHUB_SHA.Substring(0, 8)
          $tag = "build-$env:GITHUB_RUN_NUMBER-$shortSha"
          $title = "qBittorrent Material build #$env:GITHUB_RUN_NUMBER ($shortSha)"

          if (gh release view $tag --repo $env:GITHUB_REPOSITORY 2>$null) {
            gh release upload $tag $env:INSTALLER_PATH `
              --clobber `
              --repo $env:GITHUB_REPOSITORY
          }
          else {
            $notes = @"
          Automated Windows release for commit ``$env:GITHUB_SHA``.

          - Build: ``$env:QBT_BUILD_ID``
          - Branch: ``$env:GITHUB_REF_NAME``
          - Installer SHA256: ``$env:INSTALLER_SHA256``
          "@

            gh release create $tag $env:INSTALLER_PATH `
              --repo $env:GITHUB_REPOSITORY `
              --target $env:GITHUB_SHA `
              --title $title `
              --notes $notes `
              --latest
          }

      - name: Remove completed Actions artifacts
        if: always()
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $artifacts = @()
          $page = 1
          do {
            $response = gh api `
              "repos/$env:GITHUB_REPOSITORY/actions/artifacts?per_page=100&page=$page" |
              ConvertFrom-Json
            $batch = @($response.artifacts)
            $artifacts += $batch
            $page++
          } while ($batch.Count -eq 100)

          foreach ($artifact in $artifacts) {
            $runStatus = gh api `
              "repos/$env:GITHUB_REPOSITORY/actions/runs/$($artifact.workflow_run.id)" `
              --jq '.status'
            if ($runStatus -ne "completed") {
              Write-Host "Leaving active artifact $($artifact.name) ($($artifact.id)) in place."
              continue
            }
            gh api --method DELETE `
              "repos/$env:GITHUB_REPOSITORY/actions/artifacts/$($artifact.id)"
            Write-Host "Deleted completed artifact $($artifact.name) ($($artifact.id))."
          }

          $remaining = gh api `
            "repos/$env:GITHUB_REPOSITORY/actions/artifacts?per_page=100" |
            ConvertFrom-Json
          $completedRemaining = @($remaining.artifacts | Where-Object {
            $status = gh api `
              "repos/$env:GITHUB_REPOSITORY/actions/runs/$($_.workflow_run.id)" `
              --jq '.status'
            $status -eq "completed"
          })
          if ($completedRemaining.Count -ne 0) {
            throw "Completed Actions artifacts remain after cleanup: $($completedRemaining.Count)."
          }
          Write-Host "No completed Actions artifacts are retained."
