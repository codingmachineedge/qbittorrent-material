<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 320" role="img" aria-labelledby="title desc">
  <title id="title">qBittorrent Material horizontal logo</title>
  <desc id="desc">The qBittorrent Material logo mark with its wordmark on a dark adaptive surface.</desc>
  <defs>
    <linearGradient id="panel" x1="24" y1="24" x2="1076" y2="296" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="mark" x1="90" y1="54" x2="290" y2="278" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366F1"/>
      <stop offset="0.55" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="accent" x1="370" y1="112" x2="930" y2="214" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A5B4FC"/>
      <stop offset="1" stop-color="#67E8F9"/>
    </linearGradient>
    <filter id="panelShadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020617" flood-opacity="0.26"/>
    </filter>
  </defs>

  <rect x="16" y="16" width="1068" height="288" rx="64" fill="url(#panel)" filter="url(#panelShadow)"/>
  <rect x="54" y="48" width="224" height="224" rx="58" fill="url(#mark)"/>
  <path d="m199 190 45 45" fill="none" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round"/>
  <path fill="#FFFFFF" fill-rule="evenodd" d="M166 76a83 83 0 1 0 0 166 83 83 0 0 0 0-166Zm0 32a51 51 0 1 1 0 102 51 51 0 0 1 0-102Z"/>
  <path d="M166 117v55m-23-9 23 23 23-23" fill="none" stroke="#A5F3FC" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="115" cy="105" r="11" fill="#67E8F9" stroke="#FFFFFF" stroke-width="4"/>
  <circle cx="216" cy="108" r="11" fill="#67E8F9" stroke="#FFFFFF" stroke-width="4"/>
  <circle cx="111" cy="193" r="11" fill="#67E8F9" stroke="#FFFFFF" stroke-width="4"/>

  <text x="334" y="164" fill="#F8FAFC" font-family="Roboto, Inter, Arial, sans-serif" font-size="72" font-weight="700" letter-spacing="-2">qBittorrent</text>
  <text x="338" y="218" fill="url(#accent)" font-family="Roboto, Inter, Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="8">MATERIAL</text>
  <rect x="887" y="82" width="139" height="40" rx="20" fill="#22D3EE" fill-opacity="0.13" stroke="#67E8F9" stroke-opacity="0.44"/>
  <text x="956.5" y="108" fill="#A5F3FC" text-anchor="middle" font-family="Roboto, Inter, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="2">DESKTOP</text>
</svg>
