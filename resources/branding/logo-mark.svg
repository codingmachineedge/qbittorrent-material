<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">qBittorrent Material logo</title>
  <desc id="desc">A rounded indigo and cyan mark combining a lowercase q, a download arrow, and three connected nodes.</desc>
  <defs>
    <linearGradient id="surface" x1="70" y1="54" x2="450" y2="464" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4F46E5"/>
      <stop offset="0.52" stop-color="#4338CA"/>
      <stop offset="1" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="glow" x1="136" y1="126" x2="378" y2="374" gradientUnits="userSpaceOnUse">
      <stop stop-color="#CFFAFE"/>
      <stop offset="1" stop-color="#67E8F9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#172554" flood-opacity="0.24"/>
    </filter>
  </defs>

  <rect x="24" y="24" width="464" height="464" rx="116" fill="url(#surface)" filter="url(#shadow)"/>
  <path d="M76 169C108 87 205 46 291 65c78 17 139 80 153 158" fill="none" stroke="#FFFFFF" stroke-opacity="0.13" stroke-width="18" stroke-linecap="round"/>

  <!-- The descending stroke sits behind the bowl and completes the lowercase q. -->
  <path d="M322 315 408 401" fill="none" stroke="#FFFFFF" stroke-width="52" stroke-linecap="round"/>
  <path fill="#FFFFFF" fill-rule="evenodd" d="M256 94a162 162 0 1 0 0 324 162 162 0 0 0 0-324Zm0 62a100 100 0 1 1 0 200 100 100 0 0 1 0-200Z"/>

  <!-- Download motion remains legible down to favicon size. -->
  <path d="M256 174v108" fill="none" stroke="url(#glow)" stroke-width="30" stroke-linecap="round"/>
  <path d="m210 263 46 46 46-46" fill="none" stroke="url(#glow)" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Three linked peers: source, destination, and shared network. -->
  <path d="m170 153 43 28m129-23-42 25m-137 126 47-25" fill="none" stroke="#A5F3FC" stroke-opacity="0.78" stroke-width="10" stroke-linecap="round"/>
  <circle cx="160" cy="146" r="19" fill="#67E8F9" stroke="#FFFFFF" stroke-width="8"/>
  <circle cx="352" cy="151" r="19" fill="#67E8F9" stroke="#FFFFFF" stroke-width="8"/>
  <circle cx="152" cy="315" r="19" fill="#67E8F9" stroke="#FFFFFF" stroke-width="8"/>
</svg>
